<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch: Singular vs. Plural Sortieren</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .basket {
            transition: all 0.3s ease;
            min-height: 180px;
        }
        .shake {
            animation: shake 0.4s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .correct-pop {
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex flex-col items-center py-6 px-4">

    <!-- Header -->
    <div class="max-w-2xl w-full text-center mb-8">
        <h1 class="text-3xl font-bold text-slate-800 mb-2">Singular vs. Plural</h1>
        <p class="text-slate-600">Sortiere die Begriffe: <b>одна целая</b> (Singular) oder <b>целых</b> (Plural).</p>
        
        <!-- Progress Bar -->
        <div class="mt-6 flex justify-between items-end mb-2">
            <span id="counter" class="text-xs font-bold text-slate-400 uppercase tracking-widest">Karte 1 / 10</span>
            <span id="score" class="text-xs font-bold text-blue-600 uppercase tracking-widest">Score: 0</span>
        </div>
        <div class="w-full bg-slate-200 h-2.5 rounded-full overflow-hidden shadow-inner">
            <div id="progress-bar" class="bg-blue-500 h-full transition-all duration-500" style="width: 10%"></div>
        </div>
    </div>

    <!-- Main Game Area -->
    <div class="max-w-4xl w-full flex flex-col gap-6">
        
        <!-- Current Card -->
        <div class="flex justify-center h-36">
            <div id="current-card" class="bg-white border-2 border-blue-100 p-6 rounded-3xl shadow-lg flex items-center justify-center text-xl md:text-2xl font-bold text-slate-800 text-center w-full max-w-md transition-opacity duration-300">
                <!-- Wort wird per JS geladen -->
            </div>
        </div>

        <!-- Baskets -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            
            <!-- Singular Basket -->
            <div onclick="checkChoice('singular')" class="basket bg-white border-2 border-dashed border-slate-300 rounded-3xl p-6 flex flex-col items-center cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition-colors group">
                <div class="bg-slate-200 group-hover:bg-blue-500 group-hover:text-white text-slate-600 px-4 py-1 rounded-full text-xs font-black uppercase mb-4 transition-colors">
                    Singular
                </div>
                <div class="text-slate-800 font-bold mb-4">одна целая...</div>
                <div id="singular-list" class="flex flex-wrap justify-center gap-2"></div>
            </div>

            <!-- Plural Basket -->
            <div onclick="checkChoice('plural')" class="basket bg-white border-2 border-dashed border-slate-300 rounded-3xl p-6 flex flex-col items-center cursor-pointer hover:border-indigo-400 hover:bg-indigo-50 transition-colors group">
                <div class="bg-slate-200 group-hover:bg-indigo-500 group-hover:text-white text-slate-600 px-4 py-1 rounded-full text-xs font-black uppercase mb-4 transition-colors">
                    Plural
                </div>
                <div class="text-slate-800 font-bold mb-4">...целых... (2, 3, 5+)</div>
                <div id="plural-list" class="flex flex-wrap justify-center gap-2"></div>
            </div>

        </div>
    </div>

    <!-- Controls -->
    <div class="mt-10 flex flex-col items-center gap-4">
        <div id="feedback" class="h-8 font-bold text-lg transition-opacity duration-300 opacity-0">
            Status
        </div>
        <button id="restart-btn" class="bg-slate-800 hover:bg-slate-900 text-white px-8 py-3 rounded-full font-bold shadow-md transition-transform active:scale-95">
            Spiel neu starten
        </button>
    </div>

    <script>
        const gameData = [
            { word: "одна целая одна zweite", type: "singular" },
            { word: "две целых две пятых", type: "plural" },
            { word: "пять целых одна десятая", type: "plural" },
            { word: "одна целая три пятых", type: "singular" },
            { word: "три целых четыре восьмых", type: "plural" },
            { word: "одна целая пять сотых", type: "singular" },
            { word: "десять целых ноль десятых", type: "plural" },
            { word: "одна целая девять десятых", type: "singular" },
            { word: "двадцать целых одна zweite", type: "plural" },
            { word: "ноль целых пять десятых", type: "plural" }
        ];

        let shuffledData = [];
        let currentIndex = 0;
        let score = 0;

        const currentCard = document.getElementById('current-card');
        const singularList = document.getElementById('singular-list');
        const pluralList = document.getElementById('plural-list');
        const progressBar = document.getElementById('progress-bar');
        const counterText = document.getElementById('counter');
        const scoreText = document.getElementById('score');
        const feedback = document.getElementById('feedback');
        const restartBtn = document.getElementById('restart-btn');

        function initGame() {
            shuffledData = [...gameData].sort(() => Math.random() - 0.5);
            currentIndex = 0;
            score = 0;
            singularList.innerHTML = '';
            pluralList.innerHTML = '';
            updateUI();
            loadCard();
            feedback.classList.add('opacity-0');
        }

        function loadCard() {
            if (currentIndex < shuffledData.length) {
                currentCard.innerText = shuffledData[currentIndex].word;
                currentCard.classList.remove('opacity-0');
            } else {
                currentCard.innerHTML = "<span class='text-green-600'>Fertig! 🏆</span>";
                showFeedback("Alle Karten sortiert!", "text-green-600");
            }
        }

        function checkChoice(choice) {
            if (currentIndex >= shuffledData.length) return;

            const correctType = shuffledData[currentIndex].type;
            const wordText = shuffledData[currentIndex].word;

            if (choice === correctType) {
                score++;
                showFeedback("Richtig! ✨", "text-green-600");
                
                // Element im Korb hinzufügen
                const item = document.createElement('div');
                item.className = "bg-blue-100 text-blue-800 px-3 py-1 rounded-lg text-sm font-bold shadow-sm correct-pop border border-blue-200";
                item.innerText = wordText;
                
                if (choice === 'singular') {
                    singularList.appendChild(item);
                } else {
                    item.className = "bg-indigo-100 text-indigo-800 px-3 py-1 rounded-lg text-sm font-bold shadow-sm correct-pop border border-indigo-200";
                    pluralList.appendChild(item);
                }

                currentIndex++;
                updateUI();
                currentCard.classList.add('opacity-0');
                setTimeout(loadCard, 300);
            } else {
                currentCard.classList.add('shake');
                showFeedback("Versuch es nochmal! ❌", "text-red-500");
                setTimeout(() => currentCard.classList.remove('shake'), 400);
            }
        }

        function updateUI() {
            scoreText.innerText = `Score: ${score}`;
            const displayIndex = Math.min(currentIndex + 1, shuffledData.length);
            counterText.innerText = `Karte ${displayIndex} / ${shuffledData.length}`;
            const progress = (currentIndex / shuffledData.length) * 100;
            progressBar.style.width = `${progress}%`;
        }

        function showFeedback(text, colorClass) {
            feedback.innerText = text;
            feedback.className = `h-8 font-bold text-lg transition-opacity duration-300 opacity-100 ${colorClass}`;
            setTimeout(() => feedback.classList.add('opacity-0'), 1500);
        }

        restartBtn.addEventListener('click', initGame);

        // Start
        initGame();
    </script>
</body>
</html>

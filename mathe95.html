<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Lernmodul: Mathe-Lesart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .option-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
        }
        .correct {
            background-color: #22c55e !important;
            border-color: #16a34a !important;
            color: white !important;
        }
        .wrong {
            background-color: #ef4444 !important;
            border-color: #dc2626 !important;
            color: white !important;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeIn 0.4s ease-out; }
    </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex flex-col items-center py-8 px-4">

    <!-- Header -->
    <div class="max-w-2xl w-full text-center mb-8">
        <h1 class="text-3xl font-black text-slate-800 mb-2 tracking-tight">Mathe-Lesart 🧮</h1>
        <p class="text-slate-600">Wie liest man diese Aufgabe im Nominativ korrekt vor?</p>
        
        <!-- Progress Bar -->
        <div class="mt-6 flex justify-between items-end mb-2">
            <span id="progress-text" class="text-xs font-bold text-slate-400 uppercase tracking-widest">Aufgabe 1 / 8</span>
            <span id="score-text" class="text-xs font-bold text-blue-500 uppercase tracking-widest">Score: 0</span>
        </div>
        <div class="w-full bg-slate-200 h-2 rounded-full overflow-hidden shadow-inner">
            <div id="progress-bar" class="bg-blue-600 h-full transition-all duration-500" style="width: 12.5%"></div>
        </div>
    </div>

    <!-- Quiz Card -->
    <div class="max-w-3xl w-full bg-white p-6 md:p-10 rounded-3xl shadow-xl border border-slate-200">
        
        <div id="quiz-content" class="animate-in">
            <!-- Math Expression in Digits -->
            <div class="text-center mb-10">
                <div id="math-display" class="text-4xl md:text-5xl font-black text-slate-700 bg-slate-50 inline-block px-10 py-6 rounded-3xl border-2 border-slate-100 shadow-inner">
                    1 ½ + 1 ½ = 3
                </div>
            </div>

            <!-- Options List -->
            <div id="options-container" class="grid grid-cols-1 gap-4">
                <!-- Buttons werden hier geladen -->
            </div>
        </div>

        <!-- Feedback Area -->
        <div id="feedback-area" class="hidden mt-8 pt-6 border-t border-slate-100 text-center animate-in">
            <p id="feedback-msg" class="text-lg font-bold mb-2"></p>
            <p id="explanation" class="text-slate-500 text-sm mb-6 leading-relaxed"></p>
            <button id="next-btn" class="bg-slate-800 text-white px-10 py-3 rounded-full font-bold hover:bg-slate-900 transition-all shadow-lg">
                Nächste Aufgabe →
            </button>
        </div>
    </div>

    <!-- Restart -->
    <button onclick="location.reload()" class="mt-10 text-slate-400 hover:text-slate-600 text-xs font-bold underline uppercase tracking-widest transition-colors">
        Quiz neu starten
    </button>

    <script>
        const quizData = [
            {
                math: "1 ½ + 1 ½ = 3",
                options: [
                    "один целая один второй плюс один целая один второй равно три",
                    "одна целая одна вторая плюс одна целая одна вторая равно три",
                    "одна целых одна вторых плюс одна целых одна вторых равно три"
                ],
                correct: 1,
                info: "Richtig! Bei '1' nutzen wir 'одна целая' (Singular, feminin)."
            },
            {
                math: "2 ⅖ + 1 = 3 ⅖",
                options: [
                    "два целых две пятых плюс один равно три целых две пятых",
                    "две целая две пятых плюс один равно три целая две пятых",
                    "две целых две пятых plus один равно три целых две пятых"
                ],
                correct: 2,
                info: "Korrekt! Ab '2' nutzen wir 'целых' (Plural) und die feminine Form 'две'."
            },
            {
                math: "0,5 + 0,5 = 1",
                options: [
                    "ноль целых пять десятых плюс ноль целых пять десятых равно один",
                    "ноль целая пять десятая плюс ноль целая пять десятая равно один",
                    "ноль целых пять десятая плюс ноль целых пять десятая равно один"
                ],
                correct: 0,
                info: "Richtig! Bei Null heißt es 'ноль целых' und 'десятых' (Plural)."
            },
            {
                math: "5,2 - 0,1 = 5,1",
                options: [
                    "пять целых два десятых минус ноль целых один десятая равно пять целых один десятая",
                    "пять целых две десятых минус ноль целых одна десятая равно пять целых одна десятая",
                    "пять целая две десятых минус ноль целая одна десятая равно пять целая одна десятая"
                ],
                correct: 1,
                info: "Sehr gut! Achte auf die Endungen: 'две десятых' (Plural) vs. 'одна десятая' (Singular)."
            },
            {
                math: "0,05 + 0,05 = 0,1",
                options: [
                    "ноль целых пять сотых плюс ноль целых пять сотых равно ноль целых одна десятая",
                    "ноль целых пять сотых плюс ноль целых fünf сотых равно ноль целых один десятая",
                    "ноль целая пять сотая плюс ноль целая пять сотая равно ноль целая одна десятая"
                ],
                correct: 0,
                info: "Richtig! Zwei Stellen nach dem Komma sind 'сотых'."
            },
            {
                math: "10 ½ - 10 = ½",
                options: [
                    "десять целая одна вторая минус десять равно одна вторая",
                    "десять целых одна вторая минус десять равно одна вторая",
                    "десять целых один второй минус десять равно один второй"
                ],
                correct: 1,
                info: "Korrekt! 'Десять целых' (Plural) und 'одна вторая' (Singular)."
            },
            {
                math: "0,005 + 0 = 0,005",
                options: [
                    "ноль целых пять тысячных плюс ноль равно ноль целых пять тысячных",
                    "ноль целая пять тысячная плюс ноль равно ноль целая fünf тысячная",
                    "ноль целых пять тысячная плюс ноль равно ноль целых пять тысячная"
                ],
                correct: 0,
                info: "Genau! Drei Stellen nach dem Komma sind 'тысячных'."
            },
            {
                math: "4 ¾ = 4 ¾",
                options: [
                    "четыре целых три четвертых",
                    "четыре целая три четвертых",
                    "четыре целых три четвертая"
                ],
                correct: 0,
                info: "Richtig! 'Четыre целых' (Plural) und 'три четвертых' (Plural)."
            }
        ];

        let currentIdx = 0;
        let score = 0;
        let canClick = true;

        const mathDisplay = document.getElementById('math-display');
        const optionsContainer = document.getElementById('options-container');
        const feedbackArea = document.getElementById('feedback-area');
        const feedbackMsg = document.getElementById('feedback-msg');
        const explanationEl = document.getElementById('explanation');
        const nextBtn = document.getElementById('next-btn');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');
        const scoreText = document.getElementById('score-text');

        function loadTask() {
            const data = quizData[currentIdx];
            canClick = true;
            feedbackArea.classList.add('hidden');
            
            progressText.innerText = `Aufgabe ${currentIdx + 1} / ${quizData.length}`;
            progressBar.style.width = `${((currentIdx + 1) / quizData.length) * 100}%`;
            mathDisplay.innerText = data.math;

            optionsContainer.innerHTML = '';
            data.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left p-5 rounded-2xl border-2 border-slate-200 bg-white font-medium text-slate-700 hover:bg-slate-50 md:text-lg";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(idx, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(idx, btn) {
            if (!canClick) return;
            canClick = false;

            const data = quizData[currentIdx];
            const isCorrect = (idx === data.correct);

            if (isCorrect) {
                score++;
                btn.classList.add('correct');
                feedbackMsg.innerText = "Hervorragend! ✨";
                feedbackMsg.className = "text-lg font-bold mb-2 text-green-600";
            } else {
                btn.classList.add('wrong');
                feedbackMsg.innerText = "Nicht ganz... ❌";
                feedbackMsg.className = "text-lg font-bold mb-2 text-red-600";
                optionsContainer.children[data.correct].classList.add('correct');
            }

            scoreText.innerText = `Score: ${score}`;
            explanationEl.innerText = data.info;
            feedbackArea.classList.remove('hidden');
        }

        nextBtn.onclick = () => {
            currentIdx++;
            if (currentIdx < quizData.length) {
                loadTask();
            } else {
                showFinal();
            }
        };

        function showFinal() {
            document.getElementById('quiz-content').innerHTML = `
                <div class="text-center py-10">
                    <div class="text-6xl mb-6">🎓</div>
                    <h2 class="text-3xl font-bold text-slate-800 mb-2">Quiz abgeschlossen!</h2>
                    <p class="text-xl text-slate-600">Du hast ${score} von ${quizData.length} Lesarten korrekt erkannt.</p>
                </div>
            `;
            feedbackArea.classList.add('hidden');
        }

        loadTask();
    </script>
</body>
</html>

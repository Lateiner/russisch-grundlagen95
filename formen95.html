<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Memory: Plural Bruchzahlen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card {
            perspective: 1000px;
            height: 110px;
            transition: opacity 1.2s ease, transform 1.2s ease;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 16px;
            padding: 10px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border: 2px solid white;
        }
        .card-back {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            color: white;
            font-size: 1.5rem;
        }
        .card-front {
            transform: rotateY(180deg);
            background-color: white;
            color: #1e293b;
            font-size: 0.85rem;
        }
        
        /* Zustand: Gefunden (Verschwinden) */
        .matched {
            opacity: 0;
            transform: scale(0.8);
            pointer-events: none;
        }

        /* Lösung-Farben für Paare */
        .pair-A { background-color: #fecaca !important; border-color: #ef4444; } /* Rot */
        .pair-B { background-color: #bbf7d0 !important; border-color: #22c55e; } /* Grün */
        .pair-C { background-color: #bfdbfe !important; border-color: #3b82f6; } /* Blau */
        .pair-D { background-color: #fef08a !important; border-color: #eab308; } /* Gelb */
        .pair-E { background-color: #ddd6fe !important; border-color: #8b5cf6; } /* Violett */
        .pair-F { background-color: #fed7aa !important; border-color: #f97316; } /* Orange */

        @media (max-width: 640px) {
            .card { height: 90px; }
            .card-front { font-size: 0.75rem; }
        }
    </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex flex-col items-center py-6 px-4">

    <!-- Header -->
    <div class="max-w-2xl w-full text-center mb-8">
        <h1 class="text-3xl font-black text-slate-800 mb-2 tracking-tight">Formen-Memory</h1>
        <p class="text-slate-500 font-medium">Deklination im Plural (2 ⅖)</p>
        
        <div class="flex justify-center gap-6 mt-6">
            <div class="bg-white px-4 py-2 rounded-full shadow-sm border border-slate-200">
                <span class="text-slate-400 text-xs uppercase font-bold">Paare:</span>
                <span id="pairs" class="text-slate-800 font-black ml-1">0 / 6</span>
            </div>
        </div>
    </div>

    <!-- Memory Grid -->
    <div id="grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4 max-w-4xl w-full mb-10">
        <!-- JS injiziert Karten -->
    </div>

    <!-- Controls -->
    <div class="flex flex-wrap justify-center gap-4">
        <button id="sol-btn" class="bg-amber-500 hover:bg-amber-600 text-white px-8 py-3 rounded-full font-bold shadow-lg transition-all active:scale-95 uppercase text-xs tracking-widest">
            Lösung anzeigen
        </button>
        <button onclick="location.reload()" class="bg-slate-800 hover:bg-slate-900 text-white px-8 py-3 rounded-full font-bold shadow-lg transition-all active:scale-95 uppercase text-xs tracking-widest">
            Neustart
        </button>
    </div>

    <script>
        const cardData = [
            { match: "A", text: "Nominativ Plural", lang: "de" },
            { match: "A", text: "две целых две пятых", lang: "ru" },
            { match: "B", text: "Genitiv Plural", lang: "de" },
            { match: "B", text: "двух целых двух пятых", lang: "ru" },
            { match: "C", text: "Dativ Plural", lang: "de" },
            { match: "C", text: "двум целым двум пятым", lang: "ru" },
            { match: "D", text: "Akkusativ Plural", lang: "de" },
            { match: "D", text: "две целых zwei пятых", lang: "ru" },
            { match: "E", text: "Instrumental Plural", lang: "de" },
            { match: "E", text: "двумя целыми двумя пятыми", lang: "ru" },
            { match: "F", text: "Präpositional Plural", lang: "de" },
            { match: "F", text: "двух целых двух пятых", lang: "ru" }
        ];

        let flippedCards = [];
        let matchedPairs = 0;
        let lockBoard = false;

        const grid = document.getElementById('grid');
        const solBtn = document.getElementById('sol-btn');

        function init() {
            const shuffled = [...cardData].sort(() => Math.random() - 0.5);
            shuffled.forEach(data => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.match = data.match;
                
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-back">?</div>
                        <div class="card-front pair-${data.match}">${data.text}</div>
                    </div>
                `;
                
                card.onclick = () => flipCard(card);
                grid.appendChild(card);
            });
        }

        function flipCard(card) {
            if (lockBoard || card.classList.contains('flipped') || card.classList.contains('matched')) return;

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                checkMatch();
            }
        }

        function checkMatch() {
            lockBoard = true;
            const [c1, c2] = flippedCards;
            const isMatch = c1.dataset.match === c2.dataset.match;

            if (isMatch) {
                matchedPairs++;
                document.getElementById('pairs').innerText = `${matchedPairs} / 6`;
                
                setTimeout(() => {
                    c1.classList.add('matched');
                    c2.classList.add('matched');
                    resetTurn();
                }, 800);
            } else {
                setTimeout(() => {
                    c1.classList.remove('flipped');
                    c2.classList.remove('flipped');
                    resetTurn();
                }, 1200);
            }
        }

        function resetTurn() {
            flippedCards = [];
            lockBoard = false;
        }

        // LÖSUNG ANZEIGEN
        solBtn.onclick = () => {
            lockBoard = true;
            const allCards = document.querySelectorAll('.card');
            allCards.forEach(card => {
                card.classList.remove('matched'); // Falls schon welche weg waren, wieder zeigen
                card.style.opacity = "1";
                card.style.transform = "scale(1)";
                card.classList.add('flipped');
                card.onclick = null; // Klicks deaktivieren
            });
            solBtn.disabled = true;
            solBtn.classList.add('opacity-50', 'cursor-not-allowed');
        };

        init();
    </script>
</body>
</html>

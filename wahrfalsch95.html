<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Quiz: Wahr oder Falsch?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .choice-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
        }
        .choice-btn:active {
            transform: scale(0.95);
        }
        .correct-bg {
            background-color: #22c55e !important;
            border-color: #16a34a !important;
            color: white !important;
        }
        .wrong-bg {
            background-color: #ef4444 !important;
            border-color: #dc2626 !important;
            color: white !important;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-feedback {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex flex-col items-center py-10 px-4">

    <!-- Header -->
    <div class="max-w-xl w-full text-center mb-8">
        <h1 class="text-3xl font-bold text-slate-800 mb-2">Wahr oder Falsch?</h1>
        <p class="text-slate-600 italic">Thema: Deklination von 1 ½ (Singular)</p>
        
        <!-- Progress -->
        <div class="mt-6 flex justify-between items-center px-2 mb-2">
            <span id="progress-text" class="text-xs font-bold text-slate-400 uppercase tracking-widest">Frage 1 / 5</span>
            <span id="score-text" class="text-xs font-bold text-blue-500 uppercase tracking-widest">Score: 0</span>
        </div>
        <div class="w-full bg-slate-200 h-2 rounded-full overflow-hidden">
            <div id="progress-bar" class="bg-blue-500 h-full transition-all duration-500" style="width: 20%"></div>
        </div>
    </div>

    <!-- Quiz Card -->
    <div class="max-w-xl w-full bg-white p-8 md:p-12 rounded-3xl shadow-xl border border-slate-200 relative">
        
        <!-- Question Area -->
        <div id="quiz-content">
            <div class="min-h-[120px] flex items-center justify-center">
                <h2 id="question-text" class="text-xl md:text-2xl font-semibold text-slate-700 text-center leading-relaxed">
                    Erscheint die Form одной целой одной второй in vier verschiedenen Fällen?
                </h2>
            </div>

            <!-- Choice Buttons -->
            <div class="grid grid-cols-2 gap-4 mt-10">
                <button onclick="handleAnswer(true)" id="btn-true" class="choice-btn py-4 rounded-2xl border-2 border-slate-200 font-bold text-lg text-slate-600 hover:bg-slate-50">
                    Wahr
                </button>
                <button onclick="handleAnswer(false)" id="btn-false" class="choice-btn py-4 rounded-2xl border-2 border-slate-200 font-bold text-lg text-slate-600 hover:bg-slate-50">
                    Falsch
                </button>
            </div>
        </div>

        <!-- Feedback Area -->
        <div id="feedback-container" class="hidden mt-8 p-6 rounded-2xl animate-feedback text-center">
            <p id="feedback-msg" class="font-bold text-lg mb-2"></p>
            <p id="explanation-text" class="text-slate-600 text-sm leading-relaxed"></p>
            <button id="next-btn" onclick="nextQuestion()" class="mt-6 bg-slate-800 text-white px-8 py-3 rounded-full font-bold hover:bg-slate-900 transition-all">
                Nächste Frage →
            </button>
        </div>
    </div>

    <button onclick="location.reload()" class="mt-10 text-slate-400 hover:text-slate-600 text-xs underline uppercase tracking-widest">
        Quiz neu starten
    </button>

    <script>
        const questions = [
            {
                text: "Erscheint die Form одной целой одной второй in vier verschiedenen Fällen?",
                correct: true,
                explanation: "Richtig! Im Genitiv, Dativ, Instrumental und Präpositional ist die Form identisch (Endung -ой)."
            },
            {
                text: "Der Akkusativ (Ich sehe...) von 1 ½ lautet одну целую одну вторую.",
                correct: true,
                explanation: "Genau! Hier ändert sich die Endung zu -ую (wie bei Adjektiven im Akkusativ Singular)."
            },
            {
                text: "Im Nominativ lautet die Zahl одной целой einer второй.",
                correct: false,
                explanation: "Falsch. Im Nominativ (Wer/Was?) heißt es: одна целая одна вторая."
            },
            {
                text: "Man muss sich im Singular eigentlich nur zwei Formen merken: Den Nominativ/Akkusativ und den Rest (-ой).",
                correct: true,
                explanation: "Stimmt! Nominativ/Akkusativ sind speziell, die anderen vier Fälle enden alle auf -ой."
            },
            {
                text: "Akkusativ und Nominativ sind bei der Zahl одна целая eine zweite immer identisch.",
                correct: false,
                explanation: "Falsch! Nominativ ist одна... und Akkusativ ist одну..."
            }
        ];

        let currentIndex = 0;
        let score = 0;

        const questionText = document.getElementById('question-text');
        const feedbackContainer = document.getElementById('feedback-container');
        const feedbackMsg = document.getElementById('feedback-msg');
        const explanationText = document.getElementById('explanation-text');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');
        const scoreText = document.getElementById('score-text');
        const btnTrue = document.getElementById('btn-true');
        const btnFalse = document.getElementById('btn-false');

        function handleAnswer(answer) {
            const currentQ = questions[currentIndex];
            const isCorrect = (answer === currentQ.correct);
            
            // Buttons deaktivieren
            btnTrue.disabled = true;
            btnFalse.disabled = true;

            // Farben setzen
            if (currentQ.correct) {
                btnTrue.classList.add('correct-bg');
                if (!isCorrect) btnFalse.classList.add('wrong-bg');
            } else {
                btnFalse.classList.add('correct-bg');
                if (!isCorrect) btnTrue.classList.add('wrong-bg');
            }

            if (isCorrect) {
                score++;
                feedbackMsg.innerText = "Korrekt! ✅";
                feedbackMsg.className = "font-bold text-lg mb-2 text-green-600";
                feedbackContainer.className = "mt-8 p-6 rounded-2xl animate-feedback text-center bg-green-50 border border-green-100";
            } else {
                feedbackMsg.innerText = "Nicht ganz... ❌";
                feedbackMsg.className = "font-bold text-lg mb-2 text-red-600";
                feedbackContainer.className = "mt-8 p-6 rounded-2xl animate-feedback text-center bg-red-50 border border-red-100";
            }

            explanationText.innerText = currentQ.explanation;
            feedbackContainer.classList.remove('hidden');
            scoreText.innerText = `Score: ${score}`;
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < questions.length) {
                // UI Reset
                feedbackContainer.classList.add('hidden');
                btnTrue.disabled = false;
                btnFalse.disabled = false;
                btnTrue.classList.remove('correct-bg', 'wrong-bg');
                btnFalse.classList.remove('correct-bg', 'wrong-bg');
                
                // Neue Daten laden
                const nextQ = questions[currentIndex];
                questionText.innerText = nextQ.text;
                
                // Progress
                const step = currentIndex + 1;
                progressText.innerText = `Frage ${step} / 5`;
                progressBar.style.width = `${(step / 5) * 100}%`;
            } else {
                showFinalScore();
            }
        }

        function showFinalScore() {
            document.getElementById('quiz-content').classList.add('hidden');
            feedbackContainer.innerHTML = `
                <h2 class="text-3xl font-bold text-slate-800 mb-4">Quiz beendet!</h2>
                <p class="text-xl text-slate-600 mb-6">Du hast ${score} von 5 Punkten erreicht.</p>
                <button onclick="location.reload()" class="bg-blue-600 text-white px-10 py-4 rounded-full font-bold shadow-lg hover:bg-blue-700 transition-all">
                    Nochmal versuchen
                </button>
            `;
            feedbackContainer.className = "mt-4 text-center animate-feedback";
            feedbackContainer.classList.remove('hidden');
        }
    </script>
</body>
</html>

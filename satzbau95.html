<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch-Lernmodul: Satzbau-Profi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .word-block {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .word-block:active { transform: scale(0.95); }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .error-shake { 
            animation: shake 0.3s ease-in-out; 
            border-color: #ef4444 !important; 
            color: #ef4444 !important;
        }
        
        .correct-pop { 
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-slate-50 font-sans min-h-screen flex flex-col items-center py-6 px-4">

    <!-- Header -->
    <div class="max-w-3xl w-full text-center mb-6">
        <h1 class="text-2xl md:text-3xl font-black text-slate-800 mb-2">Satzbau-Baukasten 🧩</h1>
        <p class="text-slate-600 text-sm mb-4">Bilde den Satz Schritt für Schritt.</p>
        
        <div class="flex justify-center items-center gap-4">
            <div id="level-indicator" class="text-xs font-bold text-blue-600 uppercase tracking-widest">Level 1 / 6</div>
            <div class="w-32 md:w-48 bg-slate-200 h-2 rounded-full overflow-hidden">
                <div id="progress-bar" class="bg-blue-500 h-full transition-all duration-500" style="width: 16%"></div>
            </div>
        </div>
    </div>

    <!-- Main Game Card -->
    <div class="max-w-4xl w-full bg-white p-6 md:p-8 rounded-3xl shadow-xl border border-slate-200">
        
        <!-- Task Description -->
        <div class="text-center mb-6">
            <div id="math-task" class="text-xl font-bold text-slate-400 bg-slate-50 inline-block px-6 py-2 rounded-full border border-slate-100">
                1 ½ + 1 ½ = 3
            </div>
        </div>

        <!-- Target Area (The sentence being built) -->
        <div id="target-area" class="flex flex-wrap justify-center gap-2 mb-10 min-h-[100px] p-4 bg-blue-50/50 rounded-2xl border-2 border-dashed border-blue-200">
            <!-- Hier erscheinen die richtigen Wörter -->
        </div>

        <!-- Word Pool -->
        <div id="pool-area">
            <p class="text-center text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Wähle das nächste Wort:</p>
            <div id="word-pool" class="flex flex-wrap justify-center gap-2">
                <!-- Wörter werden hier geladen -->
            </div>
        </div>
    </div>

    <!-- Direct Feedback Message -->
    <div id="feedback" class="mt-6 h-10 flex items-center justify-center font-bold text-center transition-all duration-300 opacity-0">
    </div>

    <!-- Navigation -->
    <div class="mt-6 flex flex-col items-center gap-4">
        <button id="next-level-btn" class="hidden bg-green-500 hover:bg-green-600 text-white px-10 py-4 rounded-full font-bold shadow-lg transition-all transform hover:scale-105">
            Nächstes Level →
        </button>
        <button onclick="resetLevel()" class="text-slate-400 hover:text-slate-600 text-xs font-bold underline uppercase tracking-widest">
            Level neu starten
        </button>
    </div>

    <script>
        const levels = [
            {
                task: "1 ½ + 1 ½ = 3",
                correct: ["Если", "к одной целой одной второй", "прибавить", "одну целую одну вторую,", "будет три."]
            },
            {
                task: "2 ⅖ - 2 ⅖ = 0",
                correct: ["Если", "от двух целых zwei пятых", "отнять", "две целых две пятых,", "будет нуль."]
            },
            {
                task: "1 ½ × 2 = 3",
                correct: ["Если", "одну целую одну вторую", "умножить", "на две целых,", "будет три."]
            },
            {
                task: "1 ½ ÷ 1 ½ = 1",
                correct: ["Если", "одну целую одну вторую", "разделить", "на одну целую одну вторую,", "будет один."]
            },
            {
                task: "0,5 + 0,5 = 1",
                correct: ["Если", "к нулю целых пяти десятым", "прибавить", "ноль целых пять десятых,", "будет один."]
            },
            {
                task: "10 - 2 ⅖ = 7 ⅗",
                correct: ["Если", "из десяти", "вычесть", "две целых две пятых,", "будет семь целых три пятых."]
            }
        ];

        let currentLevelIndex = 0;
        let currentWordIndex = 0;

        const targetArea = document.getElementById('target-area');
        const wordPool = document.getElementById('word-pool');
        const feedback = document.getElementById('feedback');
        const nextLevelBtn = document.getElementById('next-level-btn');
        const levelIndicator = document.getElementById('level-indicator');
        const progressBar = document.getElementById('progress-bar');
        const mathTask = document.getElementById('math-task');

        function loadLevel() {
            const level = levels[currentLevelIndex];
            currentWordIndex = 0;
            targetArea.innerHTML = '';
            wordPool.innerHTML = '';
            nextLevelBtn.classList.add('hidden');
            feedback.classList.add('opacity-0');
            mathTask.innerText = level.task;
            
            levelIndicator.innerText = `Level ${currentLevelIndex + 1} / ${levels.length}`;
            progressBar.style.width = `${((currentLevelIndex + 1) / levels.length) * 100}%`;

            // Wörter mischen
            const shuffled = [...level.correct].sort(() => Math.random() - 0.5);
            
            shuffled.forEach(word => {
                const div = document.createElement('div');
                div.className = "word-block bg-white border-2 border-slate-200 px-4 py-2 rounded-xl font-bold text-slate-700 shadow-sm hover:border-blue-300";
                div.innerText = word;
                div.onclick = () => handleWordClick(div, word);
                wordPool.appendChild(div);
            });
        }

        function handleWordClick(element, word) {
            const level = levels[currentLevelIndex];
            const expectedWord = level.correct[currentWordIndex];

            if (word === expectedWord) {
                // RICHTIG
                element.classList.add('opacity-0', 'pointer-events-none');
                
                const wordBox = document.createElement('div');
                wordBox.className = "bg-blue-600 text-white px-4 py-2 rounded-xl font-bold correct-pop shadow-md";
                wordBox.innerText = word;
                targetArea.appendChild(wordBox);

                currentWordIndex++;
                showFeedback("Richtig! Weiter so.", "text-green-600");

                if (currentWordIndex === level.correct.length) {
                    levelComplete();
                }
            } else {
                // FALSCH
                element.classList.add('error-shake');
                setTimeout(() => element.classList.remove('error-shake'), 400);
                showFeedback("Falsches Wort! Überlege den Satzbau.", "text-red-500");
            }
        }

        function showFeedback(text, colorClass) {
            feedback.innerText = text;
            feedback.className = `mt-6 h-10 flex items-center justify-center font-bold text-center transition-all duration-300 opacity-100 ${colorClass}`;
            setTimeout(() => {
                if (currentWordIndex < levels[currentLevelIndex].correct.length) {
                    feedback.classList.add('opacity-0');
                }
            }, 1500);
        }

        function levelComplete() {
            showFeedback("Level abgeschlossen! 🎉", "text-blue-600 text-xl scale-110");
            if (currentLevelIndex < levels.length - 1) {
                nextLevelBtn.classList.remove('hidden');
            } else {
                mathTask.innerHTML = "🏆 Alle Level gemeistert!";
            }
        }

        nextLevelBtn.onclick = () => {
            currentLevelIndex++;
            loadLevel();
        };

        function resetLevel() {
            loadLevel();
        }

        // Start
        loadLevel();
    </script>
</body>
</html>
